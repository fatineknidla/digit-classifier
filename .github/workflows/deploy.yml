name: Train and Deploy MNIST

# This 'on' block is now explicitly defined for pushes to main
on:
  push:
    branches:
      - main
  workflow_dispatch: # This allows you to run it manually from the UI for testing

env:
  REGISTRY: ghcr.io
  # Converts your-repo-name to lowercase (required for Docker tags)
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    # Stop old builds if a new push happens
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
      
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip' # Speeds up subsequent runs

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install streamlit streamlit-drawable-canvas fastapi uvicorn pillow requests

      - name: Train model
        run: |
          # If model doesn't exist in repo, run the training script
          if [ ! -f "mnist_model.pth" ]; then
            echo "Starting training..."
            python train.py
          else
            echo "Model already exists in repository, skipping training step."
          fi

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,format=short
            latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}